# Scheduled + manual refresh: re-crawl five allowlisted Groww pages and rebuild RAG index.
# See phased-architecture.md — "Scheduled refresh (GitHub Actions)".

name: Refresh corpus and index

on:
  schedule:
    # Daily 10:00 IST (UTC+5:30) = 04:30 UTC
    - cron: "30 4 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-corpus-index
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            phases/corpus/requirements.txt
            phases/index/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phases/corpus/requirements.txt
          pip install -r phases/index/requirements.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-minilm-l6-v2
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Validate allowlist (Phase 0)
        run: bash phases/foundations/validate_allowlist.sh

      - name: Phase 1.5 — re-crawl corpus
        env:
          PYTHONPATH: ${{ github.workspace }}/phases/corpus
        run: python -m ms02_corpus.p1_5_pipeline

      - name: Phase 2.5 — rebuild index
        env:
          PYTHONPATH: ${{ github.workspace }}/phases/index:${{ github.workspace }}/phases/corpus
        run: python -m ms02_index.p2_5_pipeline

      - name: Upload refresh artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: corpus-index-${{ github.run_id }}
          retention-days: 14
          path: |
            phases/corpus/corpus_build.json
            phases/corpus/normalized/**/manifest.json
            phases/corpus/normalized/**/page.md
            phases/index/index_build.json
            phases/index/chunks/index.json
            phases/index/embeddings/manifest.json
            phases/index/vector_store/manifest.json

  notify-failure:
    runs-on: ubuntu-latest
    needs: refresh
    if: failure()
    steps:
      - name: Refresh failed
        run: |
          echo "::error::Scheduled corpus/index refresh failed. See the refresh job logs and phases/quality/runbooks/crawl-failure.md"
          exit 1
