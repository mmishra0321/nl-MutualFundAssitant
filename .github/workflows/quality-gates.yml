# Phase 5 quality gates — corpus, citations, retrieval/answer golden, handoff checks.

name: Phase 5 quality

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: phase5-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            phases/quality/requirements.txt
            phases/corpus/requirements.txt
            phases/index/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phases/quality/requirements.txt
          pip install pytest

      - name: Unit tests (Phase 5)
        env:
          PYTHONPATH: ${{ github.workspace }}/phases/quality:${{ github.workspace }}/phases/answer_engine:${{ github.workspace }}/phases/index:${{ github.workspace }}/phases/corpus
        run: python -m pytest phases/quality/tests -q

      - name: Phase 5 pipeline (full)
        env:
          PYTHONPATH: ${{ github.workspace }}/phases/quality:${{ github.workspace }}/phases/answer_engine:${{ github.workspace }}/phases/index:${{ github.workspace }}/phases/corpus
          HF_HOME: ${{ github.workspace }}/phases/index/.cache/huggingface
        run: python -m ms02_hardening --json

  notify-failure:
    runs-on: ubuntu-latest
    needs: hardening
    if: failure()
    steps:
      - name: Quality gates failed
        run: |
          echo "::error::Phase 5 quality gates failed. See hardening job logs and phases/quality/HANDOFF.md"
          exit 1
